apiVersion: v2
name: agentmesh
description: >
  Production-grade, energy-optimized LLM proxy gateway. Sits transparently in
  front of any OpenAI-compatible API and adds multi-tenant auth, semantic
  caching (Qdrant), token budget enforcement (Redis), loop detection, and
  full OpenTelemetry instrumentation.
type: application
version: 0.1.0
appVersion: "v1.0.0"
keywords:
  - llm
  - ai-gateway
  - proxy
  - openai
  - semantic-cache
  - mlops
home: https://github.com/vigneshvn1995/agentmesh
sources:
  - https://github.com/vigneshvn1995/agentmesh
maintainers:
  - name: Vignesh V N
    email: vigneshvn1995@gmail.com
icon: https://raw.githubusercontent.com/vigneshvn1995/agentmesh/main/docs/logo.png
dependencies:
  # Enable with --set redis.enabled=true to run a bundled Redis for budget tracking.
  - name: redis
    version: "18.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled

  # Enable with --set qdrant.enabled=true to run a bundled Qdrant for semantic cache.
  - name: qdrant
    version: "0.x.x"
    repository: "https://qdrant.to/helm"
    condition: qdrant.enabled
