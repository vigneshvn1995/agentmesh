name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  packages: write
  contents: read
  id-token: write   # required by actions/attest-build-provenance

jobs:
  publish-docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Build for both AMD64 (cloud x86) and ARM64 (Graviton, Apple Silicon).
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/agentmesh:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/agentmesh:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/agentmesh
          subject-digest: ${{ steps.push.outputs.digest }}

  publish-helm:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    needs: publish-docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR via Helm
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Update chart dependencies
        run: helm dependency update deploy/charts/agentmesh

      - name: Package Helm chart
        run: helm package deploy/charts/agentmesh

      - name: Push Helm chart to OCI registry
        run: helm push agentmesh-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
