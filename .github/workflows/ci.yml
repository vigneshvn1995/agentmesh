name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-lint:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install golangci-lint
        # go install compiles golangci-lint from source using Go 1.26 (set up
        # above). The pre-built binary from golangci-lint-action is built with
        # Go 1.24 and cannot typecheck modules that require go1.25+.
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Run golangci-lint
        run: golangci-lint run ./...

      - name: Run tests with race detector
        # miniredis and all mock HTTP servers are in-process, so no external
        # Redis or Qdrant containers are required in the runner.
        run: go test -v -race ./...

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update chart dependencies
        run: helm dependency update deploy/charts/agentmesh

      - name: Lint Helm chart
        run: helm lint deploy/charts/agentmesh
