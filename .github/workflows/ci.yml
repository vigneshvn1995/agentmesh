name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-lint:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          # --go=1.24: golangci-lint is built with Go 1.24; passing the language
          # version explicitly avoids the "targeted Go version is higher" hard error.
          # No lint rules are affected — Go 1.24→1.26 adds no new syntax.
          args: --go=1.24 ./...
          skip-cache: false

      - name: Run tests with race detector
        # miniredis and all mock HTTP servers are in-process, so no external
        # Redis or Qdrant containers are required in the runner.
        run: go test -v -race ./...

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update chart dependencies
        run: helm dependency update deploy/charts/agentmesh

      - name: Lint Helm chart
        run: helm lint deploy/charts/agentmesh
